name: i18n Validate

on:
  pull_request:
    paths:
      - 'messages/**'
      - 'project.inlang/**'
  push:
    branches: [main]
    paths:
      - 'messages/**'
      - 'project.inlang/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate:locales
